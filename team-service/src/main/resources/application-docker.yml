server:
  port: 8082

spring:
  application:
    name: team-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/team_management?currentSchema=team}
    username: ${SPRING_DATASOURCE_USERNAME:team_user}
    password: ${SPRING_DATASOURCE_PASSWORD:team_password}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: team

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
