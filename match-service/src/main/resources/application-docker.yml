server:
  port: 8084

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/team_management?currentSchema=match}
    username: ${SPRING_DATASOURCE_USERNAME:team_user}
    password: ${SPRING_DATASOURCE_PASSWORD:team_password}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: match

services:
  team-service:
    base-url: ${TEAM_SERVICE_BASE_URL:http://team-service:8082}
  tournament-service:
    base-url: ${TOURNAMENT_SERVICE_BASE_URL:http://tournament-service:8085}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
