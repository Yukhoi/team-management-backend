services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-team_management}
      POSTGRES_USER: ${POSTGRES_USER:-team_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-team_password}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - team-management-network

  kafka:
    image: apache/kafka:3.7.2
    restart: unless-stopped
    ports:
      - "${KAFKA_HOST_PORT:-9092}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - team-management-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_HOST_PORT:-8081}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - team-management-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - team-management-network

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/team_management?currentSchema=identity
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-team_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-team_password}
      JWT_SECRET: ${JWT_SECRET:-docker-local-dev-secret-change-me-at-least-32-bytes}
      JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-30}
      APP_JWT_REFRESH_TOKEN_EXPIRATION_DAYS: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME:-admin}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-admin123}
      INIT_ADMIN_DISPLAY_NAME: ${INIT_ADMIN_DISPLAY_NAME:-System Administrator}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    ports:
      - "${IDENTITY_SERVICE_HOST_PORT:-8087}:8087"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - team-management-network

  team-service:
    build:
      context: .
      dockerfile: team-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/team_management?currentSchema=team
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-team_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-team_password}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    ports:
      - "${TEAM_SERVICE_HOST_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - team-management-network

  tournament-service:
    build:
      context: .
      dockerfile: tournament-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/team_management?currentSchema=tournament
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-team_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-team_password}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    ports:
      - "${TOURNAMENT_SERVICE_HOST_PORT:-8085}:8085"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - team-management-network

  match-service:
    build:
      context: .
      dockerfile: match-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/team_management?currentSchema=match
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-team_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-team_password}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TEAM_SERVICE_BASE_URL: http://team-service:8082
      TOURNAMENT_SERVICE_BASE_URL: http://tournament-service:8085
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    ports:
      - "${MATCH_SERVICE_HOST_PORT:-8084}:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      team-service:
        condition: service_started
      tournament-service:
        condition: service_started
    networks:
      - team-management-network

  statistics-service:
    build:
      context: .
      dockerfile: statistics-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/team_management?currentSchema=statistics
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-team_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-team_password}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    ports:
      - "${STATISTICS_SERVICE_HOST_PORT:-8086}:8086"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - team-management-network

  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/team_management?currentSchema=audit
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-team_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-team_password}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    ports:
      - "${AUDIT_SERVICE_HOST_PORT:-8083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - team-management-network

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:-docker-local-dev-secret-change-me-at-least-32-bytes}
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS:-http://localhost:5173}
      IDENTITY_SERVICE_URL: http://identity-service:8087
      TEAM_SERVICE_URL: http://team-service:8082
      TOURNAMENT_SERVICE_URL: http://tournament-service:8085
      MATCH_SERVICE_URL: http://match-service:8084
      STATISTICS_SERVICE_URL: http://statistics-service:8086
      AUDIT_SERVICE_URL: http://audit-service:8083
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    ports:
      - "${GATEWAY_SERVICE_HOST_PORT:-8088}:8088"
    depends_on:
      identity-service:
        condition: service_started
      team-service:
        condition: service_started
      tournament-service:
        condition: service_started
      match-service:
        condition: service_started
      statistics-service:
        condition: service_started
      audit-service:
        condition: service_started
    networks:
      - team-management-network

# Local development exposes every service port for debugging.
# In production, expose only gateway-service and keep business services on the Docker network.

networks:
  team-management-network:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  redis_data:
