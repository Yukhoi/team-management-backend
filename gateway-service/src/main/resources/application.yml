server:
  port: 8088

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - http://localhost:5173
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers:
                  - "*"
                allow-credentials: true
          routes:
            - id: identity-auth-route
              uri: http://localhost:8087
              predicates:
                - Path=/api/auth,/api/auth/**

            - id: identity-openapi-route
              uri: http://localhost:8087
              predicates:
                - Path=/openapi/identity/v3/api-docs
              filters:
                - RewritePath=/openapi/identity/(?<segment>.*), /$\{segment}

            - id: identity-users-route
              uri: http://localhost:8087
              predicates:
                - Path=/api/users,/api/users/**

            - id: identity-roles-route
              uri: http://localhost:8087
              predicates:
                - Path=/api/roles,/api/roles/**

            - id: team-teams-route
              uri: http://localhost:8082
              predicates:
                - Path=/api/teams,/api/teams/**

            - id: team-openapi-route
              uri: http://localhost:8082
              predicates:
                - Path=/openapi/team/v3/api-docs
              filters:
                - RewritePath=/openapi/team/(?<segment>.*), /$\{segment}

            - id: team-players-route
              uri: http://localhost:8082
              predicates:
                - Path=/api/players,/api/players/**

            - id: audit-route
              uri: http://localhost:8083
              predicates:
                - Path=/api/audit,/api/audit/**

            - id: audit-openapi-route
              uri: http://localhost:8083
              predicates:
                - Path=/openapi/audit/v3/api-docs
              filters:
                - RewritePath=/openapi/audit/(?<segment>.*), /$\{segment}

            - id: match-route
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/matches,/api/v1/matches/**,/api/v1/goals,/api/v1/goals/**

            - id: match-openapi-route
              uri: http://localhost:8084
              predicates:
                - Path=/openapi/match/v3/api-docs
              filters:
                - RewritePath=/openapi/match/(?<segment>.*), /$\{segment}

            - id: tournament-route
              uri: http://localhost:8085
              predicates:
                - Path=/api/tournaments,/api/tournaments/**

            - id: tournament-openapi-route
              uri: http://localhost:8085
              predicates:
                - Path=/openapi/tournament/v3/api-docs
              filters:
                - RewritePath=/openapi/tournament/(?<segment>.*), /$\{segment}

            - id: statistics-route
              uri: http://localhost:8086
              predicates:
                - Path=/api/statistics,/api/statistics/**

            - id: statistics-openapi-route
              uri: http://localhost:8086
              predicates:
                - Path=/openapi/statistics/v3/api-docs
              filters:
                - RewritePath=/openapi/statistics/(?<segment>.*), /$\{segment}

app:
  jwt:
    secret: ${JWT_SECRET:your-dev-secret-change-me-at-least-32-bytes}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    urls:
      - name: Identity Service API
        url: /openapi/identity/v3/api-docs
      - name: Team Service API
        url: /openapi/team/v3/api-docs
      - name: Tournament Service API
        url: /openapi/tournament/v3/api-docs
      - name: Match Service API
        url: /openapi/match/v3/api-docs
      - name: Statistics Service API
        url: /openapi/statistics/v3/api-docs
      - name: Audit Service API
        url: /openapi/audit/v3/api-docs
